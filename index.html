        Win10.onReady(function () {

                mobile:'https://unsplash.it/1125/2436/?random',

                'animated flip',

            ], 0.01);

                Win10.newMsg('Donate~', 'Scan the QR code to buy me a drink ^_^</br></br> <img src="./img/presentation/donation.png" style="width: 60%; top:800;" />')
            }, 2500);

                Win10.newMsg('Welcome~', '<a target="_blank" style="color:inherit" href="https://shang.qq.com/wpa/qunwpa?idkey=66f37313bf5f5927bde166d846a2ecccdc50b85f6e9ac5e6435ecf66ec2b6843">[Click me] Or Scan the QR code to join in QQGroup </br></br> <img src="./img/code.png" style="width: 50%; top:800;" /></a>')
            }, 2500);


        });

        //该函数可删除 Orz
        function win10_forgive_me() {
            Win10.enableFullScreen();
            layer.alert('Hello Visitor, You dont know me but I know </br>you, I want to play a game.', {}, function(index){
                var blue=$('<img src="./img/presentation/bluescreen.jpg" style="position: fixed;width: 100%;height:100%;top:0;z-index:9999999999" />');
                setTimeout(function () {
                    $('body').append(blue);
                },3000);
                setTimeout(function () {
                    blue.remove();
                    Win10.disableFullScreen();
                    setTimeout(function () {
                        layer.msg('Congratulations. You are still alive. Most people are so ungrateful to be alive. But not you. Not anymore.');

                    },1000);
                },9000);
                layer.close(index);
            });

        }
